name: canvas build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".nvmrc"
      - "crates/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            just

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Add wasm32-unknown-emscripten target
        run: rustup target add wasm32-unknown-emscripten

      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-emscripten

      # The canvas package consumes build tooling from the root Node workspace.
      # (The cross-repo TS suites were retired at the engine split; the
      # remaining smoke test is self-contained.)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Emscripten SDK
        run: python3 bin/activate-emsdk

      - name: Fix missing xlocale.h header for Emscripten
        run: |
          sudo ln -s /usr/include/locale.h /usr/include/xlocale.h

      - name: Type-check canvas wasm package
        run: pnpm --filter @grida/canvas-wasm typecheck

      - name: Build canvas wasm artifacts
        run: just build
        working-directory: crates/grida-canvas-wasm

      - name: Run canvas wasm smoke test
        run: pnpm --filter @grida/canvas-wasm test
